<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Tester</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 20px;
        font-family: system-ui, sans-serif;
    }

    h1 {
        margin-bottom: 2rem;
    }

    section {
        margin-bottom: 1.5rem;
        padding: 1rem;
        border: 1px solid #ddd;
        border-radius: 8px;
    }

    button {
        padding: 0.6rem 1rem;
        cursor: pointer;
    }

    input[type="text"] {
        width: 100%;
        padding: 0.75rem;
    }

    pre {
        background: #f5f5f5;
        padding: 1rem;
        border-radius: 6px;
        overflow-x: auto;
        white-space: pre-wrap;
    }

    .row {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 1rem;
    }

    #documentsList {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        max-height: 400px;
        overflow-y: auto;
    }

    .document-item {
        padding: 0.5rem;
        border: 1px solid #ddd;
        border-radius: 6px;
    }

    .document-name {
        font-weight: 600;
    }

    .document-meta {
        font-size: 0.85rem;
        color: #666;
    }

    .controls {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
    }
</style>


</head>
<body>

<h1>RAG Tester</h1>

<section>
    <h2>Upload Document</h2>

    <input
        type="file"
        id="fileInput"
    >

    <button id="uploadButton">
        Upload
    </button>

    <pre id="uploadOutput"></pre>
</section>

<div class="row">

    <section>
        <h2>Documents</h2>

        <div class="controls">
            <button id="refreshDocsButton">
                Refresh
            </button>
        </div>

        <div id="documentsList">
            Loading documents...
        </div>
    </section>

    <section>
        <h2>Query</h2>

        <input
            type="text"
            id="queryInput"
            placeholder="Ask something..."
        >

        <button
            id="queryButton"
            style="margin-top: 1rem;"
        >
            Retrieve
        </button>

        <h3>Final Prompt</h3>
        <pre id="promptOutput"></pre>

        <h3>Retrieved Chunks</h3>
        <pre id="contextOutput"></pre>
    </section>

</div>

<script>

    const API_URL = "http://localhost:8000";

    const uploadButton =
        document.getElementById(
            "uploadButton"
        );

    const queryButton =
        document.getElementById(
            "queryButton"
        );

    const refreshDocsButton =
        document.getElementById(
            "refreshDocsButton"
        );

    uploadButton.addEventListener(
        "click",
        uploadDocument
    );

    queryButton.addEventListener(
        "click",
        runQuery
    );

    refreshDocsButton.addEventListener(
        "click",
        loadDocuments
    );

    async function loadDocuments() {

        const container =
            document.getElementById(
                "documentsList"
            );

        try {

            container.innerHTML =
                "Loading...";

            const response =
                await fetch(
                    `${API_URL}/all-docs`
                );

            const documents =
                await response.json();

            container.innerHTML = "";

            if (
                !documents ||
                documents.length === 0
            ) {

                container.innerHTML =
                    "<p>No documents found.</p>";

                return;
            }

            documents.forEach(doc => {

                const id =
                    doc._id;

                const name =
                    doc.file_name ??
                    "Unknown";

                const type =
                    doc.file_type ??
                    "unknown";

                const div =
                    document.createElement(
                        "div"
                    );

                div.className =
                    "document-item";

                div.innerHTML = `
                    <label>
                        <input
                            type="checkbox"
                            value="${id}"
                        >

                        <span class="document-name">
                            ${name}
                        </span>

                        <div class="document-meta">
                            ${type}
                        </div>
                    </label>
                `;

                container.appendChild(
                    div
                );
            });

        } catch (error) {

            container.innerHTML =
                error.message;
        }
    }

    async function uploadDocument() {

        const file =
            document.getElementById(
                "fileInput"
            ).files[0];

        if (!file) {

            alert(
                "Select a file first."
            );

            return;
        }

        const formData =
            new FormData();

        formData.append(
            "file",
            file
        );

        try {

            const response =
                await fetch(
                    `${API_URL}/upload`,
                    {
                        method: "POST",
                        body: formData
                    }
                );

            const data =
                await response.json();

            document.getElementById(
                "uploadOutput"
            ).textContent =
                JSON.stringify(
                    data,
                    null,
                    2
                );

            await loadDocuments();

        } catch (error) {

            document.getElementById(
                "uploadOutput"
            ).textContent =
                error.message;
        }
    }

    async function runQuery() {

        const docs =
            Array.from(
                document.querySelectorAll(
                    "#documentsList input:checked"
                )
            )
            .map(
                input => input.value
            );

        const query =
            document
                .getElementById(
                    "queryInput"
                )
                .value
                .trim();

        if (!query) {

            alert(
                "Enter a query."
            );

            return;
        }

        if (docs.length === 0) {

            alert(
                "Select at least one document."
            );

            return;
        }

        try {

            const response =
                await fetch(
                    `${API_URL}/query`,
                    {
                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/json"
                        },

                        body:
                            JSON.stringify({
                                docs,
                                query
                            })
                    }
                );

            const data =
                await response.json();

            document.getElementById(
                "promptOutput"
            ).textContent =
                data.final_query;

            document.getElementById(
                "contextOutput"
            ).textContent =
                JSON.stringify(
                    data.context,
                    null,
                    2
                );

        } catch (error) {

            document.getElementById(
                "contextOutput"
            ).textContent =
                error.message;
        }
    }

    loadDocuments();

</script>


</body>
</html>
